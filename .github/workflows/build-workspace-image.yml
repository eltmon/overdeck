# Build and push pan-workspace Docker image to Fly.io registry
# Triggered on merge to main when Dockerfile changes
name: Build pan-workspace Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/pan-workspace/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  APP_NAME: pan-workspace
  REGISTRY: registry.fly.io

jobs:
  build-and-push:
    name: Build and Push to Fly Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly Registry
        run: fly auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          SHA_TAG="${{ github.sha }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG:0:8}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/pan-workspace
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          echo "## Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ steps.tag.outputs.sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
