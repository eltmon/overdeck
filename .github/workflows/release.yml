name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      npm_tag: ${{ steps.channel.outputs.npm_tag }}
      prerelease: ${{ steps.channel.outputs.prerelease }}
    steps:
      - name: Classify release channel
        id: channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-canary\.[0-9]+$ ]]; then
            echo "channel=canary" >> "$GITHUB_OUTPUT"
            echo "npm_tag=canary" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported release tag: $tag"
            exit 1
          fi

  npm:
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test CLI
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help

      - name: Publish to npm
        run: |
          if [ "${{ needs.classify.outputs.npm_tag }}" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag "${{ needs.classify.outputs.npm_tag }}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish panctl to npm
        run: |
          cd apps/desktop
          node scripts/build-for-publish.mjs
          if [ "${{ needs.classify.outputs.npm_tag }}" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag "${{ needs.classify.outputs.npm_tag }}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  desktop:
    needs: classify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            script: build:desktop:linux
            artifact: apps/desktop/dist/*.AppImage
          - os: macos-latest
            target: mac
            script: build:desktop:mac
            artifact: apps/desktop/dist/*.dmg
          - os: windows-latest
            target: win
            script: build:desktop:win
            artifact: apps/desktop/dist/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Build desktop app (${{ matrix.target }})
        run: bun run ${{ matrix.script }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  release:
    needs: [classify, npm, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Generate structured release notes
        run: |
          mkdir -p .release
          node dist/cli/index.js release notes "$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)" "${GITHUB_REF_NAME}" --write ".release/${GITHUB_REF_NAME}.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: .release/${{ github.ref_name }}.md
          prerelease: ${{ needs.classify.outputs.prerelease }}
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
