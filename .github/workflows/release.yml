name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      npm_tag: ${{ steps.channel.outputs.npm_tag }}
      prerelease: ${{ steps.channel.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Classify release channel
        id: channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-canary\.[0-9]+$ ]]; then
            echo "channel=canary" >> "$GITHUB_OUTPUT"
            echo "npm_tag=canary" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported release tag: $tag"
            exit 1
          fi

      - name: Verify tag matches pan release stable output
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          expected="${tag#v}"
          root_v=$(node -p "require('./package.json').version")
          desktop_v=$(node -p "require('./apps/desktop/package.json').version")
          contracts_v=$(node -p "require('./packages/contracts/package.json').version")
          notes_path=".release/${tag}.md"

          fail=0
          if [ "$root_v" != "$expected" ]; then
            echo "::error::package.json version is $root_v, expected $expected. Did you run 'pan release stable --version $expected'?"
            fail=1
          fi
          if [ "$desktop_v" != "$expected" ]; then
            echo "::error::apps/desktop/package.json version is $desktop_v, expected $expected."
            fail=1
          fi
          if [ "$contracts_v" != "$expected" ]; then
            echo "::error::packages/contracts/package.json version is $contracts_v, expected $expected."
            fail=1
          fi
          if [ ! -f "$notes_path" ]; then
            echo "::error::Release notes $notes_path missing. Only 'pan release stable' produces this file."
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "::error::Release guard failed. Tags must be produced by 'pan release stable' so version bumps and release notes are committed atomically."
            exit 1
          fi
          echo "Release guard passed: $tag matches all three package.json files and $notes_path is committed."

  npm:
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm >= 11.5.1 is required for OIDC trusted publishing. Node 22 LTS
      # ships npm 10.x. We can't `npm install -g npm@latest` in place — the
      # in-place upgrade corrupts npm's own dependency tree partway through
      # ("Cannot find module 'promise-retry'"). Install to a separate prefix
      # and prepend to PATH instead.
      - name: Install npm 11 for OIDC trusted publishing
        run: |
          npm install --location=global --prefix="$RUNNER_TEMP/npm-bin" npm@11
          echo "$RUNNER_TEMP/npm-bin/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/npm-bin/bin/npm" --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test CLI
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help

      # Trusted Publishing: no NODE_AUTH_TOKEN. npm authenticates to npmjs.org
      # using the GitHub OIDC token granted by `id-token: write` above. The
      # trusted-publisher config on each @panctl/* package on npmjs.com pins
      # this repo + workflow filename as the only allowed publisher.
      - name: Publish CLI to npm
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already on npm — skipping (retry-safe)."
            exit 0
          fi
          if [ "${{ needs.classify.outputs.npm_tag }}" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag "${{ needs.classify.outputs.npm_tag }}"
          fi

      - name: Build contracts
        run: cd packages/contracts && npm run build

      - name: Publish contracts to npm
        run: |
          cd packages/contracts
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already on npm — skipping (retry-safe)."
            exit 0
          fi
          if [ "${{ needs.classify.outputs.npm_tag }}" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag "${{ needs.classify.outputs.npm_tag }}"
          fi

      - name: Publish desktop to npm
        run: |
          cd apps/desktop
          node scripts/build-for-publish.mjs
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already on npm — skipping (retry-safe)."
            exit 0
          fi
          if [ "${{ needs.classify.outputs.npm_tag }}" = "latest" ]; then
            npm publish --provenance --access public
          else
            npm publish --provenance --access public --tag "${{ needs.classify.outputs.npm_tag }}"
          fi

      # The deprecate step is dropped intentionally: it required a long-lived
      # NPM_TOKEN and OIDC trusted publishing only covers publish, not metadata
      # writes. panopticon-cli and @eltmon/panctl are already deprecated on
      # npm (from prior releases) — deprecation is idempotent metadata, not
      # something to re-assert every release.

  desktop:
    needs: classify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            script: build:desktop:linux
            artifact: apps/desktop/dist/*.AppImage
          - os: macos-latest
            target: mac
            script: build:desktop:mac
            artifact: apps/desktop/dist/*.dmg
          - os: windows-latest
            target: win
            script: build:desktop:win
            artifact: apps/desktop/dist/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Build desktop app (${{ matrix.target }})
        run: bun run ${{ matrix.script }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  release:
    needs: [classify, npm, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Resolve release notes
        run: |
          notes=".release/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes" ]; then
            echo "::error::Release notes $notes are missing. 'pan release stable' must commit them before tag push."
            exit 1
          fi
          echo "Using committed release notes: $notes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: .release/${{ github.ref_name }}.md
          prerelease: ${{ needs.classify.outputs.prerelease }}
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
