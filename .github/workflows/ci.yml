name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PAN-1659: skip the heavy docs-index build in CI. The docs-RAG index is a
# repo-wide, publish-time artifact (built by prepublishOnly / build-for-publish.mjs
# on release) — it has nothing to do with verifying an individual issue's code,
# and rebuilding it in every CI job (build/test/smoke) pegged CPU and 429'd on
# HuggingFace. CI never publishes, so it never needs the index.
env:
  SKIP_DOCS_INDEX: '1'

# NOTE: This workflow is a safety check ONLY. The primary verification gate runs in
# Panopticon's verification-runner BEFORE PR creation. GitHub CI runs here for cross-developer
# verification and as a secondary check. IMPORTANT: If tests fail here, they MUST feed back
# through Panopticon's verification system (via webhook or API callback) to message the work
# agent. Without this feedback loop, failed PRs get stuck with no way for the agent to know
# and fix them. See PAN-805 for the design of this feedback bridge.

jobs:
  build:
    runs-on: ubuntu-latest
    # PAN-1651: every job MUST cap its wall-clock. Without this a hung step
    # (an orphaned dashboard server, a never-resolving health poll) runs until
    # GitHub's 6h default, the required check never reports, and PRs can't
    # merge. Fail fast so a re-run can recover.
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify lockfile integrity
        run: |
          if ! git diff --quiet bun.lock; then
            echo "bun.lock was modified by install. Lockfile is out of sync with package.json."
            exit 1
          fi

      - name: Verify Effect API surface
        run: node scripts/verify-effect-api.mjs

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Test CLI
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # PAN-1651: cap wall-clock so a hung step can't wedge the required check.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    # PAN-1651: this is the heaviest job (build + Playwright install + full
    # vitest + benchmark + dashboard server + Command Deck Playwright spec).
    # 30 min is generous headroom; a hang (e.g. the server health poll never
    # going green) fails fast instead of running to GitHub's 6h default.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # If Panopticon's verification gate or test specialist already validated
      # tests for this exact commit, the panopticon/test commit status will be
      # success. In that case, skip the redundant vitest run here — but keep
      # the rest of the job (build, Playwright, smoke test) since those exercise
      # different surfaces. Falls through to a full run when the status is
      # absent (non-pipeline pushes) or not success (verification failed).
      - name: Check for Panopticon test validation
        id: panopticon-test
        run: |
          # In PR events github.sha is the temporary merge commit, not the branch
          # head — Panopticon posts status against the branch head SHA. Prefer
          # pull_request.head.sha when present (PR runs), fall back to github.sha
          # (push to main).
          sha="${{ github.event.pull_request.head.sha || github.sha }}"
          state=$(gh api "repos/${{ github.repository }}/commits/${sha}/status" --jq \
            '.statuses[]? | select(.context == "panopticon/test") | .state' | head -n 1)
          if [ "$state" = "success" ]; then
            echo "Panopticon test specialist already validated $sha — skipping vitest."
            echo "skip_vitest=true" >> "$GITHUB_OUTPUT"
          else
            echo "No panopticon/test=success on $sha (got '${state:-none}') — running vitest."
            echo "skip_vitest=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Install Playwright browsers (root) for vitest e2e
        if: steps.panopticon-test.outputs.skip_vitest != 'true'
        run: npx playwright install --with-deps chromium

      - name: Test
        if: steps.panopticon-test.outputs.skip_vitest != 'true'
        # GitHub Actions runners have limited memory. Vitest config automatically uses 1 fork
        # in CI, preventing OOM. Local development uses up to 4 concurrent workers.
        # Root cause (PAN-805): reconciler tests with real async I/O (Retry-After sleeping)
        # exhaust heap when parallelized across many workers.
        run: npm test

      - name: Resource discovery benchmark
        run: VITEST_INCLUDE_BENCH=1 npx vitest run src/dashboard/server/services/resource-discovery.bench.ts

      - name: Install Playwright browsers
        run: cd src/dashboard/frontend && npx playwright install --with-deps chromium

      - name: Start dashboard server
        run: |
          # Detach stdin so the backgrounded server doesn't hold this step's pipe
          # open (which would keep the step "running" indefinitely). The server
          # must stay up for the Playwright step that follows, so it is not killed
          # here — the job tears it down on completion.
          DASHBOARD_URL=http://localhost:3011 nohup node dist/dashboard/server.js > /tmp/pan-dashboard.log 2>&1 < /dev/null &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3011/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/pan-dashboard.log
          exit 1

      - name: Run Command Deck Playwright spec
        env:
          DASHBOARD_URL: http://localhost:3011
        run: cd src/dashboard/frontend && npm run test:playwright

  clean-install:
    runs-on: ubuntu-latest
    name: Clean install + server smoke test
    timeout-minutes: 20  # PAN-1651: the smoke-test server poll must not be able to hang the required check.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Purge caches and install fresh
        run: |
          rm -rf node_modules
          rm -rf src/dashboard/server/node_modules
          rm -rf packages/contracts/node_modules
          bun install --frozen-lockfile

      - name: Verify Effect API surface
        run: node scripts/verify-effect-api.mjs

      - name: Build
        run: npm run build

      - name: Smoke test dashboard server
        run: |
          # Detach stdin (< /dev/null) so the backgrounded server doesn't hold
          # this step's pipe open, and capture its PID so we can stop it after
          # the health check. Without the kill the orphaned server keeps the
          # GitHub Actions step "running" indefinitely (observed: 2h+), so the
          # required check never reports a result and PRs can't merge.
          DASHBOARD_URL=http://localhost:3011 nohup node dist/dashboard/server.js > /tmp/pan-dashboard.log 2>&1 < /dev/null &
          SERVER_PID=$!
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3011/api/health > /dev/null; then
              echo "Dashboard server started successfully"
              ok=1
              break
            fi
            sleep 1
          done
          kill "$SERVER_PID" 2>/dev/null || true
          wait "$SERVER_PID" 2>/dev/null || true
          if [ "$ok" != 1 ]; then cat /tmp/pan-dashboard.log; exit 1; fi
