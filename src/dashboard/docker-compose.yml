services:
  dashboard:
    build: .
    container_name: overdeck-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      # Mount host paths for workspace/agent management
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOME}/.overdeck:/root/.overdeck:ro
      - ${HOME}/Projects:/root/Projects
    networks:
      - overdeck
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.overdeck.rule=Host(`pan.localhost`)"
      - "traefik.http.routers.overdeck.entrypoints=websecure"
      - "traefik.http.routers.overdeck.tls=true"
      - "traefik.http.services.overdeck.loadbalancer.server.port=3000"

networks:
  overdeck:
    name: overdeck
    external: true
