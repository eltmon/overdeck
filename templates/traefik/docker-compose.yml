services:
  traefik:
    image: traefik:latest
    container_name: panopticon-traefik
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "443:443"     # HTTPS
      - "8080:8080"   # Traefik Dashboard
    volumes:
      # Traefik configuration
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro

      # TLS certificates (mkcert generated)
      - ./certs:/etc/traefik/certs:ro

      # Docker socket for service discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - panopticon

    labels:
      - "traefik.enable=true"

      # Dashboard routing (traefik.pan.localhost:8080)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.pan.localhost`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

    environment:
      - DOCKER_API_VERSION=1.44

    extra_hosts:
      # Allow Traefik to reach host services (dashboard on configured ports)
      - "host.docker.internal:host-gateway"

networks:
  panopticon:
    name: panopticon
    external: true  # Network created by 'pan install'
